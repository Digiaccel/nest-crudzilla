# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: Node.js Package

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 16
          registry-url: https://npm.pkg.github.com
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DIGIACCEL_PAT }}
      - run: npm run build --if-present

  bump-and-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      newTag: ${{ steps.version-bump.outputs.newTag }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v2
        with:
          node-version: 16
          registry-url: https://npm.pkg.github.com

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DIGIACCEL_PAT }}

      - run: npm run build --if-present

      - name: Automated Version Bump
        id: version-bump
        uses: phips28/gh-action-bump-version@master
        with:
          tag-prefix: 'v'
          minor-wording: 'add'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output new tag
        env:
          NEW_TAG: ${{ steps.version-bump.outputs.newTag }}
        run: echo "new tag $NEW_TAG"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DIGIACCEL_PAT }}

  send-to-teams:
    runs-on: ubuntu-latest
    name: Send build message to Teams
    needs: [build, bump-and-publish]
    if: always()
    steps:
      - name: Send success notification to Teams
        if: ${{ needs.build.result == 'success' && needs.bump-and-publish.result == 'success' && secrets.MS_TEAMS_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.MS_TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "nest-crudzilla build success",
              "themeColor": "2EB886",
              "title": "✅ nest-crudzilla package build successful",
              "text": "Version: **${{ needs.bump-and-publish.outputs.newTag }}**<br/>Branch: **${{ github.ref_name }}**<br/>Repository: **${{ github.repository }}**",
              "potentialAction": [
                {
                  "@type": "OpenUri",
                  "name": "View Workflow Run",
                  "targets": [
                    {
                      "os": "default",
                      "uri": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }'

      - name: Send failure notification to Teams
        if: ${{ (needs.build.result == 'failure' || needs.bump-and-publish.result == 'failure') && secrets.MS_TEAMS_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.MS_TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "nest-crudzilla build failed",
              "themeColor": "E01E5A",
              "title": "❌ nest-crudzilla package build failed",
              "text": "Repository: **${{ github.repository }}**<br/>Branch: **${{ github.ref_name }}**<br/>Please check the workflow logs.",
              "potentialAction": [
                {
                  "@type": "OpenUri",
                  "name": "View Workflow Run",
                  "targets": [
                    {
                      "os": "default",
                      "uri": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }'
